version: '3.8'

services:
  veos:
    image: veos:latest
    container_name: veos
    ports:
      - "8000:8000"
    volumes:
      - data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    working_dir: /app

volumes:
  data:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=1Gb"